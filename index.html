<!DOCTYPE html>
<html>
  <head>
    <style>
      .blur_1 {
        position: absolute;
        left: 0px;
        width: 2000px;
        height: 700px;
        border-top-left-radius: 400px;
        border-top-right-radius: 400px;
        border-bottom-left-radius: 400px;
        border-bottom-right-radius: 400px;
        background-color: hsla(186.55462184873952, 65.03%, 64.12%, 1);
        opacity: 0.7;
        filter: blur(44px);
        transform: rotate(-31deg);
      }
      .blur_2 {
        position: absolute;
        left: 20rem;
        top: 0px;
        width: 1000px;
        height: 2300px;
        background-color: hsla(259.29411764705884, 100%, 50%, 0.24);
        opacity: 0.7;
        filter: blur(44px);
        transform: rotate(-29deg);
      }
      .main-wrapper_background-elements {
        position: absolute;
        left: 0%;
        top: 0%;
        right: 0%;
        bottom: 0%;
        z-index: 1;
        max-width: 80rem;
        margin-right: auto;
        margin-left: auto;
      }
    </style>
  </head>

  <body>
    <div class="main-wrapper_background-elements">
      <div class="blur_2"></div>
      <div class="blur_1"></div>
    </div>
  </body>
</html>
